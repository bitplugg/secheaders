<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SecHeaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; width: 360px; padding: 16px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    h1 span { background: linear-gradient(135deg, #3b82f6, #8b5cf6); width: 24px; height: 24px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
    .url { font-size: 12px; color: #94a3b8; word-break: break-all; margin-bottom: 12px; }
    .grade { font-size: 32px; font-weight: 800; text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .grade.A { background: #059669; color: #fff; }
    .grade.B { background: #16a34a; color: #fff; }
    .grade.C { background: #ca8a04; color: #fff; }
    .grade.D { background: #ea580c; color: #fff; }
    .grade.E { background: #dc2626; color: #fff; }
    .grade.F { background: #b91c1c; color: #fff; }
    .grade.- { background: #475569; color: #fff; }
    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #1e293b; }
    .row .name { color: #94a3b8; }
    .row .val { color: #e2e8f0; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .err { color: #fca5a5; font-size: 13px; text-align: center; padding: 20px 0; }
    .btn { display: block; width: 100%; padding: 8px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 12px; text-align: center; text-decoration: none; }
    .btn:hover { background: #2563eb; }
    .loading { text-align: center; padding: 20px; color: #94a3b8; font-size: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 24px; height: 24px; border: 3px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 8px; }
  </style>
</head>
<body>
  <h1><span>S</span>SecHeaders</h1>
  <div id="url" class="url">Загрузка...</div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      Сканирование...
    </div>
  </div>
  <a id="full" href="https://zxc-r1spclf9a-bitplugg.vercel.app/tools" target="_blank" class="btn">Открыть в SecHeaders →</a>

  <script src="popup.js"></script>
</body>
</html>
